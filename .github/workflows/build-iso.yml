name: Build Ubuntu autoinstall ISO

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xorriso \
            isolinux \
            syslinux-utils \
            squashfs-tools \
            genisoimage \
            wget \
            p7zip-full

      - name: Build ISO
        run: |
          chmod +x build-iso.sh
          sudo bash build-iso.sh

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-autoinstall-iso
          path: ./output/ubuntu-autoinstall.iso
          retention-days: 7

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: iso-${{ github.run_number }}
          name: "Ubuntu Autoinstall ISO (build ${{ github.run_number }})"
          files: ./output/ubuntu-autoinstall.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
