name: Build Ubuntu autoinstall ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xorriso \
            isolinux \
            syslinux-common \
            squashfs-tools \
            dirmngr \
            gnupg \
            wget \
            curl

      - name: Init GPG home
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg

      - name: Make script executable
        run: chmod +x build-iso.sh

      - name: Build autoinstall ISO
        run: sudo bash build-iso.sh

      - name: Detect generated ISO
        id: detect
        run: |
          ISO=$(ls *.iso 2>/dev/null | head -1)
          echo "iso=$ISO" >> $GITHUB_OUTPUT

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-autoinstall-iso
          path: ${{ steps.detect.outputs.iso }}
          retention-days: 7

      - name: Upload to transfer.sh
        run: |
          URL=$(curl -s --upload-file "${{ steps.detect.outputs.iso }}" \
            https://transfer.sh/ubuntu-autoinstall.iso)
          echo "ССЫЛКА ДЛЯ ПРОВАЙДЕРА: $URL"
