name: Build Ubuntu autoinstall ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xorriso \
            squashfs-tools \
            p7zip-full \
            wget \
            isolinux \
            syslinux-common \
            dirmngr \
            gnupg

      - name: Init GPG home
        run: |
          mkdir -p /root/.gnupg
          chmod 700 /root/.gnupg
          gpgconf --kill dirmngr || true
          gpgconf --launch dirmngr

      - name: Make script executable
        run: chmod +x ./ubuntu-autoinstall-generator.sh

      - name: Build autoinstall ISO
        run: sudo ./ubuntu-autoinstall-generator.sh -a -u user-data.example

      - name: Detect generated ISO
        id: detect
        run: |
          ISO=$(ls ubuntu-autoinstall-*.iso 2>/dev/null | head -1)
          echo "iso_path=$ISO" >> $GITHUB_OUTPUT

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-autoinstall-iso
          path: ${{ steps.detect.outputs.iso_path }}
          retention-days: 7
